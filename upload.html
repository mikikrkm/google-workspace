<style>
body {
  font-family: sans-serif;
  background: #f7f8fa;
  padding: 40px;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

h2 {
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

button {
  background: #ff4d4f;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#drop-area {
  border: 2px dashed #ccc;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  transition: 0.2s;
}

#drop-area.dragover {
  border-color: #333;
  background: #f9f9f9;
}

#nuts-img-ok,
#nuts-img-ng {
  display: none;
  width: 120px;
  margin: 16px auto 0;
}
</style>

<body>
  <div class="container">
    <h2>素材管理</h2>
  <select id="category">
  <option value="banner">バナー</option>
  <option value="sns">SNS</option>
  <option value="logo">ロゴ</option>
</select>
    <input type="file" id="file">
    <input type="text" id="name" placeholder="素材名">
    <input type="text" id="tag" placeholder="タグ（カンマ区切り）">
    <div id="drop-area">
  <p>ここにファイルまたはフォルダをドラッグ</p>
</div>
    <button onclick="upload()">アップロード</button>

<p id="status"></p>
  <img id="nuts-img-ok" src="./img/ナッツ_元気.png" alt="ナッツ元気">
  <img id="nuts-img-ng" src="./img/ナッツ_しょんぼり.png" alt="ナッツしょんぼり">
  </div>
</body>

<script>




  //ドラッグ＆ドロップエリア//
window.addEventListener("DOMContentLoaded", () => {

  const dropArea = document.getElementById("drop-area");

  dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("dragover");
  });

  dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
  });

  dropArea.addEventListener("drop", async (e) => {
    e.preventDefault();
    dropArea.classList.remove("dragover");

    const items = e.dataTransfer.items;

    for (const item of items) {
      const entry = item.webkitGetAsEntry();
      if (entry) {
        await traverseFileTree(entry);
      }
    }

    alert("フォルダアップロード完了！");
  });

});

//アップロード処理拡張//
async function uploadFileWithPath(file, path) {
  const res = await fetch("https://av45ti0j66.execute-api.ap-northeast-1.amazonaws.com/getUploadUrl", {
    method: "POST",
    body: JSON.stringify({
      fileName: path,   // ←ここが重要！！
      fileType: file.type
    })
  });

  const data = await res.json();

  await fetch(data.url, {
    method: "PUT",
    body: file
  });

  console.log("アップ:", path);
}
//バージョン管理//
const version = "v1";

function addVersionToPath(path, fileName){
  const parts = path.split("/"); // ["やさしえ","PHO",""]
  
  const folder = parts[0]; // やさしえ
  const rest = parts.slice(1).join("/"); // PHO/

  return `${folder}_${version}/${rest}${fileName}`;
}


//フォルダ再帰処理//
async function traverseFileTree(item, path = "") {
  if (item.isFile) {
    item.file(async (file) => {
      const today = new Date().toISOString().slice(0,10);

      const parts = path.split("/").filter(p => p !== "");
      const folder = parts[0] || "default"; // フォルダない場合の保険
      const rest = parts.slice(1).join("/");

      const fullPath = `${folder}_${today}/${rest}${file.name}`;

      await uploadFileWithPath(file, fullPath);
    });
  } 
  else if (item.isDirectory) {
    const dirReader = item.createReader();
    dirReader.readEntries(async (entries) => {
      for (const entry of entries) {
        await traverseFileTree(entry, path + item.name + "/");
      }
    });
  }
}

async function uploadFile(file) {
  // ① 署名URL取得
  const res = await fetch("https://av45ti0j66.execute-api.ap-northeast-1.amazonaws.com/getUploadUrl", {
    method: "POST",
    body: JSON.stringify({
      fileName: file.name,
      fileType: file.type
    })
  });

  const data = await res.json();

  // ② S3にPUT
  await fetch(data.url, {
    method: "PUT",
    body: file
  });

  console.log("アップ完了:", file.name);
}


async function upload(){
  const file = document.getElementById("file").files[0];
  const category = document.getElementById("category").value;
  const nutsImgOk = document.getElementById("nuts-img-ok");
  const nutsImgNg = document.getElementById("nuts-img-ng");
  const status = document.getElementById("status");

  if(!file){
    alert("ファイル選んでね");
    return;
  }

  try {
    // ① 署名URL取得
    const res = await fetch("https://av45ti0j66.execute-api.ap-northeast-1.amazonaws.com/getUploadUrl", {
      method: "POST",
      body: JSON.stringify({
        fileName: file.name,
        category: category
      })
    });

    const data = await res.json();
    const putRes = await fetch(data.url, {
      method: "PUT",
      body: file
    });

    if (putRes.ok) {
      // アップロード成功
      status.textContent = "アップロード成功！";
      status.style.color = "green";
      nutsImgOk.style.display = "block";
      nutsImgNg.style.display = "none";
    } else {
      throw new Error("PUTリクエスト失敗");
    }
  } catch (e) {
    // アップロード失敗
    status.textContent = "アップロード失敗…";
    status.style.color = "red";
    nutsImgOk.style.display = "none";
    nutsImgNg.style.display = "block";
    console.error(e);
  }
}
//
</script>
